<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/frontend/logoicone/logo_codeburger.png" type="image/x-icon">
    <title>Code Burguer</title>
    <link rel="stylesheet" href="/frontend/css/home.css" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body class="home-page">

    <div id="loading-screen">
        <div class="loading-logo">Code <span>•</span> Burger</div>
    </div>

    <header>
        <div class="container">
            <div class="logo">
                <a href="">Code <span>•</span> Burger</a>
            </div>
            <nav>
                <ul class="leftside">
                    <li><a href="">Início</a></li>
                    <li><a href="">Contato</a></li> 
                </ul>
                
                <div class="rightside">
                    <a href="login.html" class="button">Login</a>
                </div>
                <div class="rightside">
                    <a href="cadastro.html" class="button">Cadastro</a>
                </div>
                <div class="rightside">
                    <a href="carrinho.html" class="cart-icon-link">
                        <i class="fas fa-shopping-cart cart-icon"></i>
                        <span id="cart-counter" class="cart-badge">0</span>
                    </a>
                </div>
            </nav>
            <div class="menu">
                <div class="menu-icon">
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="leftside">
                <h1>O Hamburguer mais delicioso!</h1>
                <p>A primeira hamburgueria virtual que você faz o pedido online e come o burger através do computador.</p>
                <a href="#cardapio" class="button">Fazer pedido</a>
            </div>
            <div class="rightside">
                <img src="/frontend/assets/heroBurger.png" alt="Burger delicioso" />
            </div>
        </div>
    </section>

    <section class="search" id="cardapio">
        <div class="container">
            <div class="title">Pesquise o seu<br />Hamburguer favorito!</div>

            <div class="sides">
                <div class="leftside">
                    <input type="text" id="search" placeholder="Digite o nome do Burger" />
                </div>

                <div class="rightside">
                    <select onchange="filtrarPorCategoria(this.value)">
                        <option value="Burgers">Selecionar categoria</option>
                        <option value="Burgers">Burgers</option>
                        <option value="Pizza">Pizza</option>
                        <option value="Vegetariano">Vegetariano</option>
                        <option value="Kids">Kids</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <main>
        <div class="container">
            <div class="products-grid" id="lista-lanches"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="logo">
                <a href="">Code <span>•</span> Burger</a>
            </div>
        </div>
    </footer>

    <script src="/frontend/js/global.js"></script>
    <script src="/frontend/js/lanche.js" defer></script>
    <script src="/frontend/js/index.js"></script>

    <script>
        window.addEventListener('load', function() {
            const loader = document.getElementById('loading-screen');
            if(loader) {
                setTimeout(() => {
                    loader.classList.add('fade-out');
                    document.body.classList.add('loaded'); 
                }, 600);

                loader.addEventListener('transitionend', () => {
                    loader.remove();
                });
            }
        });
    </script>
</body>
</html>
