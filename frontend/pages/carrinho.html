<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/frontend/logoicone/logo_codeburger.png" type="image/x-icon">
    <title>Meu Carrinho - Code Burger</title>
    <link rel="stylesheet" href="/frontend/css/carrinho.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>
    <header class="header">
        <a href="/frontend/pages/index.html" class="logo-link">
            <h1>Code <span>•</span> Burger</h1>
        </a>
    </header>

    <main class="container">
        <h2>Meu Carrinho</h2>
        <div class="carrinho-layout">
            <section id="lista-itens" class="itens-carrinho">
            </section>

            <aside class="resumo-pedido">
                <h3>Resumo do Pedido</h3>

                <div class="detalhe-preco">
                    <span>Subtotal</span>
                    <span id="subtotal">R$ 0,00</span>
                </div>
                <div class="detalhe-preco total">
                    <span>Total</span>
                    <span id="total">R$ 0,00</span>
                </div>

                <a href='/frontend/pages/pagamento.html' class="btn-finalizar">Finalizar Pedido</a>
                <a href="/frontend/pages/index.html" class="continuar-comprando">Continuar comprando</a>
                <button id="btn-limpar-carrinho" class="btn-limpar">Limpar Carrinho</button>
            </aside>
        </div>
    </main>

    <footer class="footer">
        <p>Code <span>Burger</span></p>
    </footer>

    <script src="/frontend/js/carrinho.js"></script>
</body>

</html>
